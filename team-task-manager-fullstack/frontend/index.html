<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#2563eb,#14b8a6);height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:white;padding:35px;border-radius:18px;width:420px}
    input,select,button{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:1px solid #ccc}
    button{background:#2563eb;color:white;font-weight:bold}
    .link{background:white;color:#2563eb;border:none}
    .msg{color:#b45309;margin-top:10px}
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>Team Task Manager</h1>
    <p>Create projects, assign tasks, and track progress.</p>

    <div class="msg" id="msg"></div>

    <div id="signupBox" style="display:none">
      <input id="name" placeholder="Name">
      <select id="role">
        <option value="admin">Admin</option>
        <option value="member">Member</option>
      </select>
    </div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="submitForm()" id="submitBtn">Login</button>
    <button class="link" onclick="toggleForm()" id="toggleBtn">New user? Signup</button>
  </div>

<script>
const API = "https://team-task-manager-production-fb1e.up.railway.app/api";
let signup = false;

function toggleForm(){
  signup = !signup;
  document.getElementById("signupBox").style.display = signup ? "block" : "none";
  document.getElementById("submitBtn").innerText = signup ? "Create Account" : "Login";
  document.getElementById("toggleBtn").innerText = signup ? "Already have account? Login" : "New user? Signup";
  document.getElementById("msg").innerText = "";
}

async function submitForm(){
  const body = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value
  };

  const endpoint = signup ? "/auth/signup" : "/auth/login";

  try {
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.message || "Failed");

    localStorage.setItem("token", data.token || "");
    document.getElementById("app").innerHTML = `
      <h1>Team Task Manager Dashboard</h1>
      <p>Welcome, ${data.user?.name || body.email}</p>
      <p>Role: ${data.user?.role || body.role}</p>
      <h3>Features</h3>
      <ul>
        <li>Authentication Signup/Login</li>
        <li>Project Management</li>
        <li>Task Assignment</li>
        <li>Status Tracking Dashboard</li>
      </ul>
      <button onclick="location.reload()">Logout</button>
    `;
  } catch(err) {
    document.getElementById("msg").innerText = err.message;
  }
}
</script>
</body>
</html>
