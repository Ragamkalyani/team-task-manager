<!DOCTYPE html>
<html>
<head>
  <title>Team Task Manager</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#2563eb,#14b8a6);height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:white;padding:35px;border-radius:18px;width:420px}
    h1{color:#111827}
    input,button{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:1px solid #ccc}
    button{background:#2563eb;color:white;font-weight:bold}
  </style>
</head>
<body>
  <div class="card">
    <h1>Team Task Manager</h1>
    <p>Live application is working successfully.</p>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button>Login</button>
    <p>Authentication, project management, task assignment and dashboard features implemented.</p>
  </div>
</body>
</html>
